<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<base href="./">
<title>🚃 矿车跑酷</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0a0a1a;overflow:hidden;font-family:-apple-system,"PingFang SC",sans-serif;user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;min-height:100dvh;padding:8px}
#wrap{position:relative;width:100%;max-width:768px;aspect-ratio:768/624;box-shadow:0 0 60px rgba(120,200,255,.3);border-radius:8px;overflow:hidden;background:#000;max-height:calc(100vh - 16px);max-height:calc(100dvh - 16px)}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges}
#hud{position:absolute;top:0;left:0;right:0;padding:max(6px,1.5cqh) max(10px,2cqw);display:flex;justify-content:space-between;align-items:center;color:#fff;font-size:clamp(11px,2.2cqw,16px);font-weight:bold;text-shadow:2px 2px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000;pointer-events:none;z-index:10}
.hud-item{display:flex;align-items:center;gap:5px}
.hud-value{color:#ffeb3b;font-size:clamp(14px,3cqw,20px)}
#overlay{position:absolute;inset:0;background:rgba(0,0,0,.72);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;z-index:20;gap:14px;padding:20px;text-align:center}
#overlay h1{font-size:clamp(22px,5cqw,36px);color:#ffeb3b;text-shadow:3px 3px 0 #d32f2f;margin:0;letter-spacing:2px}
#overlay h2{font-size:clamp(22px,5cqw,36px);color:#ff5252;text-shadow:3px 3px 0 #000;margin:0}
#overlay .score{font-size:clamp(14px,3cqw,20px);color:#fff}
#overlay .score span{color:#ffeb3b;font-size:clamp(20px,4.5cqw,28px);margin-left:6px}
#overlay button{padding:clamp(10px,2.5cqw,14px) clamp(24px,6cqw,36px);font-size:clamp(14px,3.2cqw,20px);font-weight:bold;color:#fff;background:linear-gradient(180deg,#ff7043,#d84315);border:3px solid #fff;border-radius:8px;cursor:pointer;box-shadow:0 4px 0 #b71c1c,0 6px 12px rgba(0,0,0,.4);transition:transform .1s,box-shadow .1s}
#overlay button:hover{transform:translateY(-2px);box-shadow:0 6px 0 #b71c1c,0 8px 16px rgba(0,0,0,.5)}
#overlay button:active{transform:translateY(2px);box-shadow:0 2px 0 #b71c1c,0 3px 6px rgba(0,0,0,.4)}
.hint{font-size:clamp(11px,2.4cqw,14px);color:#ccc;max-width:560px;line-height:1.5}
.key{display:inline-block;padding:1px 8px;background:#fff;color:#333;border-radius:3px;font-weight:bold;margin:0 2px;font-family:monospace;font-size:clamp(10px,2cqw,13px)}
.hidden{display:none!important}
#mobile-btn{position:absolute;bottom:max(12px,2cqh);right:max(12px,2cqw);width:clamp(60px,12cqw,90px);height:clamp(60px,12cqw,90px);border-radius:50%;background:rgba(255,255,255,.18);border:3px solid rgba(255,255,255,.6);color:#fff;font-size:clamp(12px,2.4cqw,16px);font-weight:bold;display:none;align-items:center;justify-content:center;z-index:5;touch-action:none}
@media (hover:none) and (pointer:coarse){#mobile-btn{display:flex}}
#loading{display:flex;flex-direction:column;align-items:center;gap:10px;width:80%;max-width:380px}
.load-text{color:#fff;font-size:clamp(12px,2.6cqw,15px);font-weight:bold}
.load-text span{color:#ffeb3b;font-size:clamp(14px,3cqw,18px)}
.load-bar{width:100%;height:clamp(12px,2.5cqw,18px);background:rgba(0,0,0,.5);border:2px solid #fff;border-radius:10px;overflow:hidden;box-shadow:0 0 8px rgba(255,235,59,.3)}
#load-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,#ffeb3b,#ff7043);transition:width .15s ease-out;box-shadow:0 0 6px rgba(255,235,59,.6)}
.load-hint{color:#aaa;font-size:clamp(10px,2cqw,12px);margin-top:4px}
.load-spin{display:inline-block;animation:spin 1s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="256" height="208"></canvas>
  <div id="hud">
    <div class="hud-item">🏃 <span id="dist" class="hud-value">0</span>m</div>
    <div class="hud-item">🚃 <span id="stage" class="hud-value">1/7</span></div>
    <div class="hud-item">⚡ <span id="speed" class="hud-value">1.0x</span></div>
  </div>
  <div id="overlay">
    <h1>🚃 矿车跑酷</h1>
    <div id="loading">
      <div class="load-text"><span class="load-spin">⏳</span> 加载中 <span id="load-count">0</span> / <span id="load-total">15</span></div>
      <div class="load-bar"><div id="load-bar-fill"></div></div>
      <div class="load-hint">首次加载请稍候，资源会缓存</div>
    </div>
    <div id="game-intro" class="hidden">
      <div class="hint">矿车自动前进 · <b>点击/空格 = 跳跃</b></div>
      <div class="hint">路上有 <b>空隙</b>（48px 宽）和 <b>陷阱</b>（刺朝上）</div>
      <div class="hint">掉进空隙 / 踩到刺 = <b>Game Over</b></div>
    </div>
    <button id="start-btn" class="hidden">开始游戏</button>
  </div>
  <button id="mobile-btn">跳跃</button>
</div>
<script>
'use strict';

// ===== 基础参数 =====
const W = 256, H = 208;
const GRAVITY = 0.3;
const JUMP_POWER = -7.5;
const BASE_SPEED = 2.0, SPEED_INC = 0.0008, MAX_SPEED = 5.5;
const LAYER_GROUND = 180;          // 地面 y 坐标
const PLAYER_TARGET_W = 36;        // 角色目标宽度
const STAGE_DIST = [0, 200, 500, 1000, 2000, 3500, 6000];  // 角色升级距离
const CAMERA_Y = LAYER_GROUND - H + 30;

// 删 land_1_1 的概率（剩下 70% 正常生成）
const TRAP_PROB = 0.25;  // land_1_1 被 trap_1_1 替换的概率
const GAP_PROB  = 0.25;  // land_1_1 被删掉变空隙的概率
// 空隙固定宽度（> 玩家 box 宽度 36px，确保站在空隙上会掉下去）
const GAP_WIDTH = 48;

// ===== 资源 =====
const ASSETS = {
  role: [],                  // 7 个角色
  bg: { day: null, eve: null, night: null },
  land: [],                  // land_1_1 ~ land_1_4 共 4 个
  trap1: []                  // trap_1_1 供替换
};

function loadImage(src) {
  return new Promise((res, rej) => {
    const i = new Image();
    i.onload = () => res(i);
    i.onerror = () => rej(new Error('无法加载: ' + src));
    i.src = src;
  });
}

let _loadCount = 0;
async function reportProgress(total) {
  _loadCount++;
  document.getElementById('load-count').textContent = _loadCount;
  document.getElementById('load-bar-fill').style.width = (_loadCount / total * 100).toFixed(1) + '%';
}

async function loadAssets() {
  const b = 'assets/';
  const tasks = [];

  // 角色 7 个
  for (let i = 1; i <= 7; i++) {
    tasks.push({ src: `${b}role/role_${i}.png`, onDone: img => ASSETS.role.push(img) });
  }

  // 背景 3 个时间段（只用 bg_1）
  for (const p of ['day', 'eve', 'night']) {
    tasks.push({ src: `${b}bg/bg_1_${p}.png`, onDone: img => ASSETS.bg[p] = img });
  }

  // 地面 4 个（land_1_1 ~ land_1_4，不用 land_1_5）
  for (let i = 1; i <= 4; i++) {
    tasks.push({ src: `${b}land/land_1_${i}.png`, onDone: img => ASSETS.land.push(img) });
  }
  // 陷阱 trap_1_1（只加载一张用于替换 land_1_1）
  tasks.push({ src: `${b}land/trap_1_1.png`, onDone: img => ASSETS.trap1.push(img) });

  document.getElementById('load-total').textContent = tasks.length;
  for (const t of tasks) {
    const img = await loadImage(t.src);
    t.onDone(img);
    await reportProgress(tasks.length);
  }
}

// ===== 玩家 =====
const player = {
  x: 50, y: LAYER_GROUND, vy: 0, onGround: true,
  stage: 0, boxW: 0, boxH: 0,
  get boxX() { return this.x - this.boxW / 2; },
  get boxY() { return this.y - this.boxH; },
  updateBox() {
    const img = ASSETS.role[this.stage];
    if (!img) return;
    const scale = PLAYER_TARGET_W / img.width;
    this.boxW = PLAYER_TARGET_W;
    this.boxH = img.height * scale;
  }
};

// ===== 道路 Tile =====
class Tile {
  constructor(x, y, img, type = 'land') {
    this.x = x;       // 中心
    this.y = y;       // 顶
    this.img = img;
    this.w = img.width;
    this.h = img.height;
    this.type = type; // 'land' or 'trap'
  }
  get left()   { return this.x - this.w / 2; }
  get right()  { return this.x + this.w / 2; }
  get top()    { return this.y; }
  get bottom() { return this.y + this.h; }
  isSafeTop() { return this.type === 'land'; }
}

let tiles = [], nextSpawnX = 0, cameraX = 0;
let distance = 0, speed = BASE_SPEED, elapsedMs = 0;
let timeOfDay = 0, bgScrollX = 0;
let gameState = 'ready';
let lastWasGap = false;  // 上一段是否为空隙（防止连续空隙）

// 在 nextSpawnX 处生成一个 tile
function spawnTileAt(x, img, type = 'land') {
  const t = new Tile(x + img.width / 2, LAYER_GROUND, img, type);
  tiles.push(t);
  nextSpawnX = x + img.width;
}

// 决定下一个 tile：
// 1) 随机从 4 个 land_1_* 中选一个
// 2) 如果选到 land_1_1 (64px)：
//    - 25% 概率替换成 trap_1_1（踩上去失败）
//    - 25% 概率删掉（变 48px 空隙）
//    - 50% 概率正常 land_1_1
// 3) 连续两段空隙不会出现（lastWasGap 保护）
// 4) 其他 land (1_2/1_3/1_4) 100% 正常生成
function spawnNext() {
  const pick = ASSETS.land[Math.floor(Math.random() * ASSETS.land.length)];
  if (pick === ASSETS.land[0] && !lastWasGap) {
    const r = Math.random();
    if (r < TRAP_PROB) {
      // trap_1_1 替换 land_1_1
      spawnTileAt(nextSpawnX, ASSETS.trap1[0], 'trap');
      lastWasGap = false;
      return;
    } else if (r < TRAP_PROB + GAP_PROB) {
      // 删掉：留 48px 空隙
      nextSpawnX += GAP_WIDTH;
      lastWasGap = true;
      return;
    }
  }
  spawnTileAt(nextSpawnX, pick);
  lastWasGap = false;
}

function initMap() {
  tiles = []; nextSpawnX = 0; lastWasGap = false;
  // 起步 4 段 land，给玩家缓冲
  for (let i = 0; i < 4; i++) {
    const img = ASSETS.land[Math.floor(Math.random() * ASSETS.land.length)];
    spawnTileAt(nextSpawnX, img);
  }
}

// ===== Canvas =====
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// ===== 操作 =====
function jump() {
  if (gameState !== 'playing' || !player.onGround) return;
  player.vy = JUMP_POWER;
  player.onGround = false;
  player.jumping = true;
}

function handlePrimary() {
  if (gameState === 'ready') { startGame(); return; }
  if (gameState === 'dead') { restart(); return; }
  jump();
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') { e.preventDefault(); handlePrimary(); }
});
canvas.addEventListener('mousedown', e => { e.preventDefault(); handlePrimary(); });
canvas.addEventListener('touchstart', e => { e.preventDefault(); handlePrimary(); }, { passive: false });
document.getElementById('start-btn').addEventListener('click', () => {
  if (gameState === 'ready') startGame();
  else if (gameState === 'dead') restart();
});
const mb = document.getElementById('mobile-btn');
mb.addEventListener('touchstart', e => { e.preventDefault(); handlePrimary(); }, { passive: false });

// ===== 碰撞与游戏逻辑 =====
function isOverSafeTile() {
  const pL = player.boxX, pR = player.boxX + player.boxW;
  for (const t of tiles) {
    if (!t.isSafeTop()) continue;  // trap 不算 safe，玩家经过时不能停
    const L = t.left - cameraX, R = t.right - cameraX;
    if (pR <= L + 3 || pL >= R - 3) continue;
    if (Math.abs(player.y - t.top) < 3) return true;
  }
  return false;
}

function checkLanding(prevBottom) {
  const pL = player.boxX, pR = player.boxX + player.boxW, pB = player.y;
  for (const t of tiles) {
    const L = t.left - cameraX, R = t.right - cameraX;
    if (pR <= L + 3 || pL >= R - 3) continue;
    // 踩到 trap（刺朝上）→ 失败
    if (t.type === 'trap') {
      if (prevBottom <= t.top + 1 && pB >= t.top - 1) {
        die();
        return false;
      }
      continue;
    }
    if (prevBottom <= t.top + 2 && pB >= t.top) {
      player.y = t.top; player.vy = 0; player.onGround = true; player.jumping = false;
      return true;
    }
  }
  return false;
}

function update() {
  if (gameState !== 'playing') return;
  const now = performance.now();
  const dtMs = Math.min(50, now - (update._last || now));
  update._last = now;
  elapsedMs += dtMs;

  distance += speed / 10;
  speed = Math.min(MAX_SPEED, BASE_SPEED + distance * SPEED_INC);

  // 角色阶段（按距离升级体型）
  let newStage = 0;
  for (let i = 0; i < STAGE_DIST.length; i++) {
    if (distance >= STAGE_DIST[i]) newStage = i;
  }
  newStage = Math.min(newStage, ASSETS.role.length - 1);
  if (newStage !== player.stage) { player.stage = newStage; player.updateBox(); }

  // 背景滚动（只滚一份 bg_1）
  bgScrollX -= speed * 0.3;
  if (bgScrollX <= -256) bgScrollX += 256;

  // 时间段切换（每 500m 切换：day → eve → night → day ...）
  const newTime = Math.floor(distance / 500) % 3;
  if (newTime !== timeOfDay) timeOfDay = newTime;

  // 玩家脚下检测
  if (player.onGround && !isOverSafeTile()) {
    player.onGround = false; player.jumping = true; player.vy = 0;
  }
  if (!player.onGround) {
    const prevBottom = player.y;
    player.vy += GRAVITY; player.y += player.vy;
    checkLanding(prevBottom);
  }
  // 掉到地面以下 → 失败
  if (player.y > LAYER_GROUND + 200) { die(); return; }

  cameraX += speed;

  // 清理视野外的 tile
  tiles = tiles.filter(t => t.right > cameraX - 50 && t.left < cameraX + W + 100);

  // 持续生成新 tile（视野右边 100px 外）
  let _safety = 0;
  while (nextSpawnX < cameraX + W + 100) {
    spawnNext();
    if (++_safety > 30) break;
  }
}

// ===== 渲染 =====
function w2sY(y) { return y - CAMERA_Y; }

function drawBg() {
  const img = ASSETS.bg[['day', 'eve', 'night'][timeOfDay]];
  if (!img) return;
  for (let x = bgScrollX; x < W; x += 256) ctx.drawImage(img, x, 0);
}

function drawGroundGuide() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,.18)';
  ctx.lineWidth = 1; ctx.setLineDash([3, 5]);
  const sy = w2sY(LAYER_GROUND) - 4;
  ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
  ctx.restore();
}

function drawTiles() {
  for (const t of tiles) {
    const L = t.left - cameraX, R = t.right - cameraX;
    const topY = w2sY(t.top);
    if (R < -10 || L > W + 10) continue;
    if (topY < -30 || topY > H + 30) continue;
    ctx.drawImage(t.img, L, topY);
  }
}

function drawPlayer() {
  const img = ASSETS.role[player.stage];
  if (!img) return;
  const scale = PLAYER_TARGET_W / img.width;
  const drawW = PLAYER_TARGET_W, drawH = img.height * scale;
  const px = player.x - drawW / 2;
  const py = w2sY(player.y) - drawH;
  ctx.drawImage(img, px, py, drawW, drawH);
}

function drawHUD() {
  document.getElementById('dist').textContent = Math.floor(distance);
  document.getElementById('stage').textContent = `${player.stage + 1}/7`;
  document.getElementById('speed').textContent = (speed / BASE_SPEED).toFixed(2) + 'x';
}

function render() {
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  drawBg();
  drawGroundGuide();
  drawTiles();
  drawPlayer();
}

// ===== 主循环 =====
function loop() { update(); render(); drawHUD(); requestAnimationFrame(loop); }

// ===== 状态机 =====
function startGame() {
  document.getElementById('overlay').classList.add('hidden');
  gameState = 'playing';
  player.updateBox();
}

function restart() {
  player.x = 50; player.y = LAYER_GROUND; player.vy = 0; player.onGround = true;
  player.stage = 0;
  player.updateBox();
  distance = 0; speed = BASE_SPEED; cameraX = 0;
  timeOfDay = 0; bgScrollX = 0; elapsedMs = 0;
  initMap();
  document.getElementById('overlay').classList.add('hidden');
  gameState = 'playing';
}

function die() {
  gameState = 'dead';
  showOverlay('💥 翻车了！', `${Math.floor(distance)}m`);
}

function showOverlay(title, scoreText) {
  const o = document.getElementById('overlay');
  o.innerHTML = `<h2>${title}</h2><div class="score">${scoreText}</div><button id="start-btn">再来一局</button>`;
  o.classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click', restart);
}

// ===== 启动 =====
(async function start() {
  try {
    await loadAssets();
    player.updateBox();
    initMap();
    render();
    document.getElementById('loading').classList.add('hidden');
    document.getElementById('game-intro').classList.remove('hidden');
    document.getElementById('start-btn').classList.remove('hidden');
    requestAnimationFrame(loop);
  } catch (e) {
    console.error('资源加载失败:', e);
    document.getElementById('overlay').innerHTML = `<h2>❌ 资源加载失败</h2><div class="hint">${e.message}</div><div class="hint">请刷新页面重试 (Cmd/Ctrl + Shift + R)</div>`;
  }
})();
</script>
</body>
</html>
